[services.redis]
local_port = 6379
target = "docker://redis:6379"

[services.auth]
local_port = 8080
target = "remote://staging.company.com:8080"

[services.api-gateway]
local_port = 3000
target = "kubectl://gateway/api-gw-pod:3000"
