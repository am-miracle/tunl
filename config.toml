[services.postgres]
local_port = 15432
target = "remote://127.0.0.1:5432"

[services.demo]
local_port = 9000
bind_address = "::1"
target = "docker://tunl-demo:8000"

[services.web]
local_port = 8080
bind_address = "::"
allow_remote_connections = true
target = "kubectl://default/web-0:8080"

[services.web.connection]
connect_timeout = "5s"
backoff_initial = "500ms"
backoff_max = "10s"
